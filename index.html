<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primer - Intelligence Dashboard</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  
  <!-- Theme initialization (prevent flash of wrong theme) -->
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  
  <!-- External Libraries -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  
  <!-- CSS Reset & Variables -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">

  <!-- Base Styles -->
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">

  <!-- Components - Core -->
  <link rel="stylesheet" href="css/buttons.css">

  <link rel="stylesheet" href="css/badges.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/dropdown.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/entity-list.css">

  <!-- Components - Features -->
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/charts.css">
  <link rel="stylesheet" href="css/maps.css">
  <link rel="stylesheet" href="css/timeline.css">
  <link rel="stylesheet" href="css/tags.css">
  <link rel="stylesheet" href="css/annotations.css">
  <link rel="stylesheet" href="css/document-viewer.css">
  <link rel="stylesheet" href="css/chat.css">

  <!-- Components - Legacy (to be further split) -->
  <link rel="stylesheet" href="css/components.css">

  <!-- View-specific -->
  <link rel="stylesheet" href="css/monitors.css">
  <link rel="stylesheet" href="css/monitor-editor.css">

  <!-- Utilities (last for override capability) -->
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>
  <!-- Sidebar strip with chat toggle -->
  <div class="sidebar-strip">
    <button id="chat-toggle" class="btn btn-primary btn-icon chat-toggle-btn" title="Toggle Chat">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </button>
  </div>

  <nav class="top-navbar">
    <div class="navbar-left">
      <a href="#/monitors" class="logo">
        <img src="img/logo.png" alt="Primer" class="logo-img">
      </a>
      
      <div class="navbar-links">
        <a href="#/search" class="nav-link" data-view="search">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="7" cy="7" r="4.5"/>
            <path d="M10.5 10.5L14 14"/>
          </svg>
          <span>Search</span>
        </a>
        <a href="#/projects" class="nav-link" data-view="projects">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M2 1C1.44771 1 1 1.44772 1 2V14C1 14.5523 1.44771 15 2 15H14C14.5523 15 15 14.5523 15 14V3.5C15 2.94772 14.5523 2.5 14 2.5H8.26759L7.56446 1.4453C7.37899 1.1671 7.06676 1 6.73241 1H2ZM2 2H6.73241L7.43554 3.0547C7.62101 3.3329 7.93324 3.5 8.26759 3.5H14V4.5H2V2ZM2 5.5V14H14V5.5H2Z"/>
          </svg>
          <span>Projects</span>
          <svg class="nav-chevron" viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </a>
        <a href="#/monitors" class="nav-link" data-view="monitors">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 1l1.5 4.5L14 7l-4.5 1.5L8 13l-1.5-4.5L2 7l4.5-1.5z"/>
          </svg>
          <span>AI Briefings</span>
        </a>
        <a href="#/workspaces" class="nav-link" data-view="workspaces">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="14" height="14" rx="1"/>
            <path d="M1 5h14"/>
            <path d="M5 5v10"/>
          </svg>
          <span>Workspaces</span>
        </a>
      </div>
    </div>
    
    <div class="navbar-right">
      <!-- Search Filters link -->
      <a href="#/search-filters" class="nav-link" data-view="search-filters">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1.5 2h13M3.5 5.5h9M5.5 9h5M7 12.5h2"/>
        </svg>
        <span>Saved Filters</span>
      </a>

      <!-- Scratchpad button -->
      <button class="navbar-scratchpad-btn" title="Scratchpad">
        <span>Scratchpad</span>
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" stroke-width="0">
          <path d="M13.25,1H4.25c-.5523071,0-1,.4476929-1,1v1.0435181c-.2122803.0374756-.4407959.1015015-.6538696.2037964-.4118652.1976318-.8461304.5880737-.8461304,1.2507324s.4342651,1.0531006.8461304,1.2507324c.2130737.1022949.4415894.1663208.6538696.2037964v.5909424c-.2122803.0374756-.4407959.1015015-.6538696.2037964-.4118652.1976318-.8461304.5880737-.8461304,1.2507324s.4342651,1.0531006.8461304,1.2507324c.2130737.1022949.4415894.1663208.6538696.2037964v.5909424c-.2122803.0374756-.4407959.1015015-.6538696.2037964-.4118652.1976929-.8461304.5880737-.8461304,1.2506714,0,.6627197.4342651,1.0531006.8461304,1.2507935.2130737.1022949.4415894.1663208.6538696.2037964v1.0474243c0,.5523071.4476929,1,1,1h9c.5523071,0,1-.4476929,1-1V2c0-.5523071-.4476929-1-1-1ZM3.25,11.9285889c-.0771484-.0213623-.1524048-.0482788-.2211304-.0812988-.2131348-.1022949-.2788696-.2119141-.2788696-.3493042,0-.1372681.0657349-.2468872.2788696-.3491821.0687256-.03302.1439819-.0598755.2211304-.0812988v.861084ZM3.25,8.4286499c-.0771484-.0214844-.1524048-.0484009-.2211304-.0813599-.2131348-.1022949-.2788696-.2119141-.2788696-.3492432s.0657349-.2468872.2788696-.3492432c.0687256-.032959.1439819-.0598755.2211304-.0813599v.8612061ZM3.25,4.9286499c-.0771484-.0214844-.1524048-.0484009-.2211304-.0813599-.2131348-.1022949-.2788696-.2119141-.2788696-.3492432s.0657349-.2468872.2788696-.3492432c.0687256-.032959.1439819-.0598755.2211304-.0813599v.8612061ZM13.25,14H4.25v-2.9324951c.0771484.0214233.1524048.0482788.2211304.0812988.2131348.1022949.2788696.2119141.2788696.3491821,0,.2761841.223877.5.5.5s.5-.2238159.5-.5c0-.6625977-.4342651-1.0529785-.8461304-1.2506714-.2130737-.1022949-.4415894-.1663208-.6538696-.2037964v-2.4760742c.0771484.0214844.1524048.0484009.2211304.0813599.2131348.102356.2788696.2119141.2788696.3492432,0,.276123.223877.5.5.5s.5-.223877.5-.5c0-.6626587-.4342651-1.0531006-.8461304-1.2507324-.2130737-.1022949-.4415894-.1663208-.6538696-.2037964v-2.4760742c.0771484.0214844.1524048.0484009.2211304.081         </svg>
      </button>

      <!-- Help / notifications icon -->
      <button class="btn-icon navbar-icon-btn" title="Help">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" stroke-width="0">
          <path d="M6.9000001,5.3000002c-.2000003.1999998-.4000001.5999999-.4000001,1.1999998,0,.3000002-.1999998.5-.5.5s-.5-.1999998-.5-.5c0-.9000001.3000002-1.5.8000002-1.9000001.5-.5,1.0999999-.5999999,1.6999998-.5999999.6000004,0,1.1999998.0999999,1.6999998.5999999.5.4000001.8000002,1.0999999.8000002,1.9000001s-.3999996,1.4000001-.8999996,1.8000002c-.4000006.3000002-.8000002.5-1.1000004.5999994v.6000004c0,.3000002-.1999998.5-.5.5s-.5-.1999998-.5-.5v-.8000002c0-.3999996.1999998-.5999994.5-.6999998.3000002-.0999999.6000004-.3000002,1-.5.3000002-.3000002.5-.5999999.5-1,0-.5999999-.1999998-1-.3999996-1.1999998-.3000002-.2000003-.7000008-.3000002-1.1000004-.3000002-.4000001,0-.8000002.0999999-1.0999999.3000002ZM8.8000002,11.1999998c0,.5-.4000006.8000002-.8000002.8000002-.4000001,0-.8000002-.3000002-.8000002-.8000002s.3000002-.8000002.8000002-.8000002c.3999996.1000004.8000002.4000006.8000002.8000002ZM8,1c-3.9000001,0-7,3.0999999-7,7s3.0999999,7,7,7,7-3.1000004,7-7S11.8999996,1,8,1ZM8,14c-3.3000002,0-6-2.6999998-6-6s2.6999998-6,6-6,6,2.6999998,6,6-2.6999998,6-6,6Z"/>
        </svg>
      </button>

      <!-- Dark mode toggle -->
      <button id="theme-toggle" class="btn-icon navbar-icon-btn" title="Toggle dark mode">
        <svg class="theme-icon theme-icon-light" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" stroke-width="0">
          <path d="M10.3023061,1.086457c-.729248-.3311768-1.3712769.4512329-1.2080078,1.2353516.4926147,2.366333-.0873413,4.8009033-1.7871704,6.5007324-1.2805176,1.2805176-2.9779663,1.9254761-4.7490845,1.9552002-.8193359.0137939-1.460083.8363647-.9484863,1.4765015,1.333313,1.668396,3.385498,2.7373047,5.6873169,2.7373047,4.0186157,0,7.2764282-3.2578125,7.2764282-7.2764282,0-2.9469604-1.7518921-5.4846802-4.2709961-6.6286621ZM7.296874,13.9915473c-1.9128418,0-3.6254272-.8547363-4.7780762-2.2064209.0181885-.0045776.0370483-.0072021.0559692-.0075073,2.0045166-.0336914,3.9579468-.7664795,5.4394531-2.2479858,1.9705811-1.9705811,2.6105957-4.7627563,2.059082-7.4116821-.0025024-.0119019-.0039062-.0238647-.0043945-.0357666,2.0778809,1.0247192,3.5043945,3.163208,3.5043945,5.6329346,0,3.4663086-2.8101196,6.2764282-6.2764282,6.2764282Z"/>
        </svg>
        <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <!-- User Avatar -->
      <div class="nav-dropdown avatar-dropdown">
        <button class="avatar-trigger">
          <span class="avatar-initials">N</span>
        </button>
        <div class="nav-dropdown-menu avatar-menu">
          <div class="avatar-menu-header">
            <span class="avatar-name">Nicole Thayer</span>
            <span class="avatar-email">nicole.thayer@primer.ai</span>
          </div>
          <div class="avatar-menu-divider"></div>
          <button class="avatar-menu-item" id="open-settings-avatar">
            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="2.5"/>
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M2.9 13.1l1.4-1.4M11.7 4.3l1.4-1.4"/>
            </svg>
            <span>Settings</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Full-width page header slot (above chat and content) -->
  <div id="page-header-slot"></div>

  <div class="content-wrapper">
    <main id="app" class="main-content">
    <div class="loading-state">
      <div class="loader"></div>
      <p>Initializing dashboard...</p>
    </div>
  </main>
  
  <!-- Modal Container -->
  <div id="modal-container" class="modal-container hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  </div><!-- /content-wrapper -->

  <!-- Chat Panel -->
  <aside id="chat-panel" class="chat-panel">
    <div class="chat-resize-handle" id="chat-resize-handle"></div>
    <div class="chat-header">
      <div class="chat-header-title">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span>Chat</span>
      </div>
      <button id="chat-close" class="btn-icon chat-close-btn" title="Close chat">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4l8 8M12 4l-8 8"/>
        </svg>
      </button>
    </div>
    <div id="chat-messages" class="chat-messages">
      <div id="chat-welcome" class="chat-message assistant">
        <div class="chat-message-content">
          Loading page summary...
        </div>
      </div>
      <div id="chat-suggested-questions" class="chat-suggested-questions">
        <!-- Populated dynamically -->
      </div>
    </div>
    <div id="chat-status" class="chat-status"></div>
    <div id="chat-search-input" class="chat-input-mount"></div>
  </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
